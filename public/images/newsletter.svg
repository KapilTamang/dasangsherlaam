<svg width="600" height="500" viewBox="0 0 600 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5b9dff"/>
      <stop offset="55%" stop-color="#3c83f6"/>
      <stop offset="100%" stop-color="#1f5fe0"/>
    </linearGradient>
    <linearGradient id="flapGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7db1ff"/>
      <stop offset="100%" stop-color="#3c83f6"/>
    </linearGradient>
    <linearGradient id="paperGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f1f6ff"/>
    </linearGradient>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3c83f6" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#3c83f6" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3c83f6" stop-opacity="0.22"/>
      <stop offset="70%" stop-color="#3c83f6" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#3c83f6" stop-opacity="0"/>
    </radialGradient>
    <filter id="dropShadow" x="-60%" y="-60%" width="220%" height="220%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#1a4fc4" flood-opacity="0.28"/>
    </filter>
    <filter id="softShadowSm" x="-80%" y="-80%" width="260%" height="260%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#1a4fc4" flood-opacity="0.22"/>
    </filter>
  </defs>

  <!-- ambient glow -->
  <circle cx="300" cy="255" r="235" fill="url(#glow)"/>

  <!-- orbit rings -->
  <circle cx="300" cy="255" r="190" fill="none" stroke="url(#ringGrad)" stroke-width="1.5" stroke-dasharray="1 12" stroke-linecap="round"/>
  <circle cx="300" cy="255" r="150" fill="none" stroke="#3c83f6" stroke-opacity="0.12" stroke-width="1"/>

  <!-- floating sparkle dots -->
  <circle cx="95" cy="120" r="6" fill="#3c83f6" fill-opacity="0.3"/>
  <circle cx="512" cy="150" r="4.5" fill="#3c83f6" fill-opacity="0.4"/>
  <circle cx="530" cy="340" r="8" fill="#3c83f6" fill-opacity="0.22"/>
  <circle cx="78" cy="365" r="5.5" fill="#3c83f6" fill-opacity="0.32"/>
  <circle cx="470" cy="420" r="4" fill="#3c83f6" fill-opacity="0.4"/>
  <path d="M470 90 l4 10 l10 4 l-10 4 l-4 10 l-4 -10 l-10 -4 l10 -4 Z" fill="#3c83f6" fill-opacity="0.35"/>
  <path d="M110 400 l3 7 l7 3 l-7 3 l-3 7 l-3 -7 l-7 -3 l7 -3 Z" fill="#3c83f6" fill-opacity="0.3"/>

  <!-- small back envelope, tilted -->
  <g transform="translate(422,142) rotate(20)" filter="url(#softShadowSm)">
    <rect x="0" y="0" width="86" height="60" rx="9" fill="#ffffff"/>
    <path d="M3 7 L43 36 L83 7" fill="none" stroke="#3c83f6" stroke-opacity="0.55" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- small front-left envelope, tilted -->
  <g transform="translate(70,300) rotate(-16)" filter="url(#softShadowSm)">
    <rect x="0" y="0" width="66" height="46" rx="8" fill="#ffffff"/>
    <path d="M2 5 L33 28 L64 5" fill="none" stroke="#3c83f6" stroke-opacity="0.55" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- main envelope -->
  <g filter="url(#dropShadow)">
    <rect x="145" y="185" width="310" height="205" rx="20" fill="url(#bodyGrad)"/>

    <!-- letter peeking out -->
    <g>
      <rect x="180" y="128" width="240" height="148" rx="12" fill="url(#paperGrad)"/>
      <circle cx="215" cy="163" r="12" fill="#3c83f6" fill-opacity="0.9"/>
      <path d="M209 163 h12 M215 157 v12" stroke="#ffffff" stroke-width="2.4" stroke-linecap="round"/>
      <rect x="240" y="156" width="130" height="9" rx="4.5" fill="#c7dbff"/>
      <rect x="240" y="172" width="90" height="7" rx="3.5" fill="#e1ecff"/>
      <rect x="205" y="200" width="195" height="7" rx="3.5" fill="#dbe8ff"/>
      <rect x="205" y="218" width="175" height="7" rx="3.5" fill="#dbe8ff"/>
      <rect x="205" y="236" width="140" height="7" rx="3.5" fill="#dbe8ff"/>
      <rect x="205" y="254" width="100" height="9" rx="4.5" fill="#3c83f6"/>
    </g>

    <!-- envelope flap over the letter -->
    <path d="M145 195 L300 322 L455 195 L455 372 A20 20 0 0 1 435 392 L165 392 A20 20 0 0 1 145 372 Z"
          fill="url(#flapGrad)"/>
    <path d="M145 195 L300 322 L455 195"
          fill="none" stroke="#2456c9" stroke-width="3" stroke-opacity="0.65" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M145 372 L268 298" stroke="#2456c9" stroke-width="2.5" stroke-opacity="0.35" stroke-linecap="round"/>
    <path d="M455 372 L332 298" stroke="#2456c9" stroke-width="2.5" stroke-opacity="0.35" stroke-linecap="round"/>
  </g>

  <!-- notification bell -->
  <g transform="translate(400,162)" filter="url(#softShadowSm)">
    <circle cx="0" cy="0" r="28" fill="#ffffff"/>
    <path d="M0 -11 c-6.5 0 -10 4.5 -10 11 v5.5 l-3.5 4.5 h27 l-3.5 -4.5 v-5.5 c0 -6.5 -3.5 -11 -10 -11 Z" fill="#3c83f6"/>
    <path d="M-4.5 12 a4.5 4.5 0 0 0 9 0" fill="#3c83f6"/>
    <circle cx="10" cy="-10" r="5.5" fill="#ff8a3d"/>
  </g>

  <!-- paper airplane accent -->
  <g transform="translate(455,268) rotate(-16)" filter="url(#softShadowSm)">
    <path d="M0 0 L38 9 L0 18 L7 9 Z" fill="#ffffff"/>
    <path d="M0 0 L20 9 L7 9 Z" fill="#cfe0ff"/>
  </g>
</svg>
